name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install ruff

      - name: Lint Python
        working-directory: apps/api
        run: ruff check .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Lint JavaScript
        working-directory: apps/web
        run: |
          npm ci
          npm run lint

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: apps/api
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
        run: pytest --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./apps/api/coverage.xml
          flags: backend

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run tests
        working-directory: apps/web
        run: npm run test

      - name: Build
        working-directory: apps/web
        run: npm run build

  ml-validation:
    name: ML Model Validation
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ML dependencies
        working-directory: apps/api
        run: pip install scikit-learn xgboost lightgbm pandas numpy shap

      - name: Validate models
        working-directory: apps/api
        run: |
          python -c "
          from app.services.risk_engine import RiskEngine
          import asyncio

          engine = RiskEngine()
          features = {
              'blood_markers': {'HbA1c': 5.5, 'Fasting Glucose': 100},
              'lifestyle': {'exercise_minutes': 30, 'sleep_hours': 7, 'weight_kg': 70, 'smoking': False},
              'family_history': []
          }

          async def validate():
              results = await engine.assess_all('test-user-id', features)
              for r in results:
                  score = r['risk_score']
                  print(f\"{r['disease']}: {score:.2%}\")
                  if score > 0.95:
                      raise ValueError(f'Model returned unrealistic score: {score}')

          asyncio.run(validate())
          print('ML models validated successfully')
          "